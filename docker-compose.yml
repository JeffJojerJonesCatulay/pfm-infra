services:
  pfm-database:
    image: mysql:8.0
    container_name: pfm-database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --lower_case_table_names=1
    ports:
      - "3306:3306"
    volumes:
      - pfm_mysql_data:/var/lib/mysql

  pfm-api:
    image: jeffjojerjonescatulay/pfm-api-image-repo:${API_IMAGE_TAG}
    container_name: pfm-api
    restart: always
    depends_on:
      - pfm-database
    environment:
      - SERVER_PORT=${API_PORT}
      - DB_URL=jdbc:mysql://pfm-database:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true
      - DB_USERNAME=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - SECRET=${API_SECRET}
    ports:
      - "${API_PORT}:${API_PORT}"

  pfm-web:
    image: jeffjojerjonescatulay/pfm-web-image-repo:${WEB_IMAGE_TAG}
    container_name: pfm-web
    restart: always
    depends_on:
      - pfm-api
    ports:
      - "${WEB_PORT}:80"
    volumes:
      - ../pfm-web/nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  pfm_mysql_data:
